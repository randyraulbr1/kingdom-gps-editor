name: Compilar instalador Windows

# Compila el .exe en un runner Windows de GitHub.
# - Manualmente: pestaña Actions ▸ "Compilar instalador Windows" ▸ Run workflow
#   (deja el instalador como artefacto descargable de esa ejecución).
# - Al publicar un tag vX.Y.Z: además crea una Release con el .exe adjunto
#   (enlace de descarga estable en la pestaña Releases).
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (typecheck + bundle + instalador NSIS)
        run: npm run build

      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: KingdomGPS-Editor-Windows
          path: dist/*.exe
          if-no-files-found: error

      - name: Publicar Release con el instalador (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
