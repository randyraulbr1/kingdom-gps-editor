name: Compilar instalador Windows

# Compila el .exe en un runner Windows y PUBLICA una Release en GitHub con el
# instalador + latest.yml para que el botón "Actualizar" del editor descargue y
# actualice solo (electron-updater). El token de Actions (GITHUB_TOKEN) sí puede
# crear tags/releases, así que no hace falta empujar tags a mano.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck + bundle (main/preload/renderer)
        run: |
          npx tsc --noEmit -p tsconfig.node.json
          npx tsc --noEmit -p tsconfig.web.json
          npx electron-vite build

      - name: Compilar instalador y PUBLICAR Release (auto-update)
        # electron-builder crea el .exe, genera latest.yml y publica la Release
        # vX.Y.Z (releaseType: release en electron-builder.yml). electron-updater
        # la encuentra y el botón "Actualizar" descarga e instala.
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir instalador como artefacto (respaldo)
        uses: actions/upload-artifact@v4
        with:
          name: KingdomGPS-Editor-Windows
          path: dist/*.exe
          if-no-files-found: error
