appId: com.kingdomgps.editor
productName: KingdomGPS Editor
directories:
  output: dist
  buildResources: build
# Origen de las actualizaciones automáticas (electron-updater lee esto vía
# app-update.yml). El repo es público, así que no requiere token para descargar.
publish:
  provider: github
  owner: randyraulbr1
  repo: kingdom-gps-editor
files:
  - out/**
  - package.json
# electron-vite genera los bundles en out/{main,preload,renderer}; el resto del
# árbol (src, tests…) no se empaqueta.
win:
  target:
    - nsis
  artifactName: KingdomGPS-Editor-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KingdomGPS Editor
# Herramienta interna: el instalador va sin firmar (Windows mostrará SmartScreen).
